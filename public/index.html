<!DOCTYPE html>
<html>
<head>
  <title>Full Shop</title>
  <style>
    body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* TITLE */
.title {
  text-align: center;
  color: #00ffff;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  background: #1a1a1a;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 0 10px #00ffff;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ffff;
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 10px;
}

/* BUTTON */
button {
  padding: 10px;
  background: #00ffff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const mongoose = require("mongoose");

const schema = new mongoose.Schema({
  name: String,
  price: Number,
  image: String
});

module.exports = mongoose.model("Product", schema);
import React from "react";

function Product({ product }) {
  return (
    <div className="card">

      <img src={product.image} />

      <h2>{product.name}</h2>

      <h3>Rs {product.price}</h3>

      <button>Add to Cart</button>

    </div>
  );
}

export default Product;
import React, { useEffect, useState } from "react";
import axios from "axios";
import "./App.css";
import Product from "./components/Product";

function App() {

  const [products, setProducts] = useState([]);

  useEffect(() => {
    axios.get("http://localhost:5000/products")
      .then(res => setProducts(res.data));
  }, []);

  return (
    <div>

      <h1 className="title">🛒 Full Stack Shop</h1>

      <div className="grid">
        {products.map((p, i) => (
          <Product key={i} product={p} />
        ))}
      </div>

    </div>
  );
}

export default App;
  </script>
</body>
</html>
